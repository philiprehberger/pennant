# Canonical vhost — keep in sync with /etc/apache2/sites-available/api.pennant.philiprehberger.com.conf.
# Certbot will append the matching -le-ssl.conf companion on first --apache run.

<VirtualHost *:80>
    ServerName api.pennant.philiprehberger.com
    DocumentRoot /var/www/pennant/current/public

    <Directory /var/www/pennant/current/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # SSE: long-lived, no buffering.
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 86400
    <Location /v1/stream>
        ProxyPass        http://127.0.0.1:8081/stream
        ProxyPassReverse http://127.0.0.1:8081/stream
        SetEnv proxy-sendcl 1
        SetEnv proxy-nokeepalive 0
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/pennant-api-error.log
    CustomLog ${APACHE_LOG_DIR}/pennant-api-access.log combined
</VirtualHost>
