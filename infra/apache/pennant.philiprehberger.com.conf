# Canonical vhost for the docs / marketing / live-demo Next.js site.
# Reverse-proxies to the PM2 process at 127.0.0.1:<port>. Update the port to
# the entry registered in /var/www/ecosystem.config.js when the site lands.

<VirtualHost *:80>
    ServerName pennant.philiprehberger.com

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://127.0.0.1:3010/
    ProxyPassReverse / http://127.0.0.1:3010/

    ErrorLog ${APACHE_LOG_DIR}/pennant-web-error.log
    CustomLog ${APACHE_LOG_DIR}/pennant-web-access.log combined
</VirtualHost>
