name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - "openapi/spec.yaml"
      - "sdks/**"
      - "tests/corpus/**"
      - ".github/workflows/sdk-ci.yml"
  pull_request:
    paths:
      - "openapi/spec.yaml"
      - "sdks/**"
      - "tests/corpus/**"
      - ".github/workflows/sdk-ci.yml"

# Phase 7 ships TypeScript + React + PHP + Python SDKs. Vue / Svelte / Go
# are v2 ports — when they land they get a new job here.

jobs:
  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build

  react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build TS core (peer)
        run: |
          cd ../typescript
          npm install --no-audit --no-fund
          npm run build
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build

  php:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: vendor/bin/phpunit

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[test]
      - run: pytest -v
