name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - "openapi/spec.yaml"
      - "sdks/**"
      - "tests/corpus/**"
      - ".github/workflows/sdk-ci.yml"
  pull_request:
    paths:
      - "openapi/spec.yaml"
      - "sdks/**"
      - "tests/corpus/**"
      - ".github/workflows/sdk-ci.yml"

# PHP / Python / Go SDK jobs land in Phase 7. Until then this workflow only
# runs the TypeScript SDK and the cross-implementation drift corpus check.

jobs:
  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build
